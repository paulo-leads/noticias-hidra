name: update-noticias

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build site from Notion
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          DATABASE_ID: ${{ secrets.DATABASE_ID }}
          SITE_BASE_URL: ${{ secrets.SITE_BASE_URL }}
          SITE_TITLE: ${{ secrets.SITE_TITLE }}
        run: node scripts/build.js

      - name: Ensure Pages static files
        run: |
          mkdir -p docs
          touch docs/.nojekyll

      - name: Commit and push generated docs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs
          git commit -m "chore: update noticias from Notion" || echo "No changes to commit"
          git push
